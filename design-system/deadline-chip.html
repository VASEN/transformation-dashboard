<!-- @dsCard group="Бейджи" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Дедлайн-чип</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #06060f;
    --accent3: #00ff9d;
    --warn: #ffb800;
    --danger: #ff3b5c;
    --text: #e8eaf6;
    --text-dim: rgba(232,234,246,0.72);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .ds-row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .ds-item { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .ds-cap { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; }

  .deadline-chip {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .deadline-chip.urgent { background: rgba(255,59,92,0.15); color: var(--danger); }
  .deadline-chip.today  { background: rgba(255,59,92,0.25); color: var(--danger); border: 1px solid rgba(255,59,92,0.5); animation: pulse-today 1.5s ease-in-out infinite; }
  .deadline-chip.soon { background: rgba(255,184,0,0.15); color: var(--warn); }
  .deadline-chip.ok { background: rgba(0,255,157,0.08); color: rgba(0,255,157,0.7); }
  @keyframes pulse-today { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
</style>
</head>
<body>
  <div class="ds-row">
    <div class="ds-item">
      <span class="deadline-chip urgent">🔴 10.06.2026</span>
      <span class="ds-cap">overdue → класс .urgent</span>
    </div>
    <div class="ds-item">
      <span class="deadline-chip today">🔴 16.06.2026</span>
      <span class="ds-cap">today → класс .today (pulse)</span>
    </div>
    <div class="ds-item">
      <span class="deadline-chip soon">🟡 19.06.2026</span>
      <span class="ds-cap">urgent → класс .soon</span>
    </div>
    <div class="ds-item">
      <span class="deadline-chip soon">26.06.2026</span>
      <span class="ds-cap">soon → класс .soon</span>
    </div>
    <div class="ds-item">
      <span class="deadline-chip ok">15.09.2026</span>
      <span class="ds-cap">ok → класс .ok</span>
    </div>
  </div>
</body>
</html>
