<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Filter-select</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #06060f;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --accent: #00e5ff;
    --text: #e8eaf6;
    --text-dim: rgba(232,234,246,0.72);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    max-width: 640px;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .filter-select {
    background: #1a1a2e;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Exo 2', sans-serif;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .filter-select option { background: #1a1a2e; color: var(--text); }
</style>
</head>
<body>
  <div class="filter-bar">
    <span class="filter-label">Год</span>
    <span class="filter-select" style="cursor:default;pointer-events:none;opacity:0.9">2026</span>
    <span class="filter-label" style="margin-left:16px">Ответственный</span>
    <select class="filter-select" aria-label="Фильтр по ответственному">
      <option value="all">Все</option>
      <option>Кренёва А.А.</option>
      <option>Родевальд С.Е.</option>
      <option>Гуляев В.А.</option>
      <option>Кудряшов Е.С.</option>
    </select>
  </div>
</body>
</html>
