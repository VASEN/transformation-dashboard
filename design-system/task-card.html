<!-- @dsCard group="Таблицы" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Карточка задачи (моб. reflow)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap');
  :root {
    --bg: #06060f;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --accent: #00e5ff;
    --accent3: #00ff9d;
    --warn: #ffb800;
    --danger: #ff3b5c;
    --text: #e8eaf6;
    --text-dim: rgba(232,234,246,0.72);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .ds-cap { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }
  .ds-wrap { max-width: 420px; }

  .project-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
  .deadline-chip { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .deadline-chip.urgent { background: rgba(255,59,92,0.15); color: var(--danger); }
  .deadline-chip.soon { background: rgba(255,184,0,0.15); color: var(--warn); }
  .task-link { color: inherit; text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.2); }

  /* task-table → card reflow, lifted from @media(max-width:640px) */
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table thead { position: absolute; left: -9999px; top: -9999px; }
  .task-table tr {
    display: block;
    margin: 0 0 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 8px 4px;
  }
  .task-table td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 6px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    text-align: right;
    font-size: 12.5px;
  }
  .task-table td:last-child { border-bottom: none; }
  .task-table td::before {
    content: attr(data-label);
    flex: 0 0 auto;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
  }
</style>
</head>
<body>
  <div class="ds-cap">Строка задачи как карточка (reflow ≤640px) — метки через data-label</div>
  <div class="ds-wrap">
    <table class="task-table">
      <thead><tr><th>Проект</th><th>Тема</th><th>Статус</th><th>Назначена</th><th>Срок</th><th>Осталось</th></tr></thead>
      <tbody>
        <tr>
          <td data-label="Проект"><span class="project-tag" style="background:rgba(0,229,255,0.12);color:#00e5ff">Электронные ДС с ПИК</span></td>
          <td data-label="Тема"><a href="#" class="task-link">Согласование макетов с ПИК</a></td>
          <td data-label="Статус"><span style="color:var(--accent);font-size:12px">В работе</span></td>
          <td data-label="Назначена" style="color:var(--text-dim);font-size:12px">Петров П.П.</td>
          <td data-label="Срок"><span class="deadline-chip urgent">🔴 10.06.2026</span></td>
          <td data-label="Осталось"><span style="color:var(--danger)">−6 дн</span></td>
        </tr>
        <tr>
          <td data-label="Проект"><span class="project-tag" style="background:rgba(180,79,255,0.12);color:#b44fff">Цифровой профиль</span></td>
          <td data-label="Тема"><a href="#" class="task-link">Интеграция с ЕСИА</a></td>
          <td data-label="Статус"><span style="color:var(--text-dim);font-size:12px">Новая</span></td>
          <td data-label="Назначена" style="color:var(--text-dim);font-size:12px">Сидоров С.С.</td>
          <td data-label="Срок"><span class="deadline-chip soon">26.06.2026</span></td>
          <td data-label="Осталось"><span style="color:var(--text-dim)">+10 дн</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
